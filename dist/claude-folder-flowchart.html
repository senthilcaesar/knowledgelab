<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The .claude Folder — Decision Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Shantell+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #1a1a1f;
  --panel: rgba(40, 40, 50, 0.84);
  --panel-border: rgba(255, 255, 255, 0.12);
  --text: #f0ecf8;
  --muted: #b8b0cc;
  --line: rgba(200, 180, 255, 0.4);
  --line-active: #c9b8ff;
  --shadow: 0 22px 48px rgba(0, 0, 0, 0.36);
}
* { box-sizing: border-box; }
html { height: 100%; }
body {
  margin: 0;
  min-height: 100vh;
  min-height: 100dvh;
  font-family: "Manrope", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top, rgba(160, 120, 255, 0.09), transparent 30%),
    linear-gradient(180deg, #1e1b28 0%, #1a1a1f 100%);
  overflow: hidden;
}
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

.page { width: 100%; min-height: 100vh; min-height: 100dvh; margin: 0; padding: 0; overflow-x: hidden; }

.chart-shell { position: relative; min-height: 100vh; min-height: 100dvh; overflow: visible; }
.chart-grid { position: relative; padding: 0; min-height: 100vh; min-height: 100dvh; overflow: visible; }

.chart-stage {
  position: absolute;
  top: 0;
  left: 50%;
  width: 2000px;
  height: 1134px;
  transform-origin: top center;
}

.connections {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

.line {
  fill: none;
  stroke: var(--line);
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: stroke 180ms ease, stroke-width 180ms ease, opacity 180ms ease;
  opacity: 0.8;
  marker-end: url(#arrowhead);
}
.line.active {
  stroke: var(--line-active);
  stroke-width: 4;
  opacity: 1;
  filter: drop-shadow(0 0 10px rgba(200, 184, 255, 0.4));
  marker-end: url(#arrowhead-active);
}

.node-layer { position: relative; min-height: 1134px; z-index: 2; }

.node {
  position: absolute;
  width: 340px;
  padding: 16px 20px 18px;
  border-radius: 18px;
  border: 1.5px solid color-mix(in srgb, var(--accent) 80%, white 20%);
  background: linear-gradient(
    160deg,
    color-mix(in srgb, var(--accent) 45%, #0e0c14 55%) 0%,
    color-mix(in srgb, var(--accent) 62%, #0e0c14 38%) 100%
  );
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.07),
    0 16px 26px rgba(0,0,0,0.22);
  color: var(--title);
  transition:
    transform 180ms ease,
    box-shadow 180ms ease,
    border-color 180ms ease,
    filter 180ms ease;
}

.node-root {
  --title: #1e1730;
  --subtitle: #4a3e70;
  background:
    radial-gradient(circle at 14% 16%, rgba(255,255,255,0.44), transparent 28%),
    radial-gradient(circle at 86% 12%, rgba(230,220,255,0.28), transparent 32%),
    linear-gradient(160deg, rgba(240,235,255,0.98) 0%, rgba(218,210,240,0.97) 100%);
  border-color: rgba(255,255,255,0.5);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.42),
    0 22px 38px rgba(0,0,0,0.28),
    0 0 0 1px rgba(255,255,255,0.1),
    0 0 24px rgba(200,180,255,0.12);
}
.node-root .node-meta { background: rgba(50,35,80,0.12); color: #3d2f60; }

.node button { all: unset; display: block; cursor: pointer; width: 100%; }

.node:hover, .node:focus-within, .node.active {
  transform: translateY(-3px) scale(1.01);
  border-color: color-mix(in srgb, var(--accent) 68%, white 32%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.11),
    0 24px 36px rgba(0,0,0,0.28);
  filter: saturate(1.1);
}

.node-title {
  display: block;
  font-family: 'Shantell Sans', cursive;
  font-size: clamp(1.3rem, 1.85vw, 2.05rem);
  line-height: 1.08;
  font-weight: 550;
  letter-spacing: -0.01em;
}
.node-subtitle {
  display: block;
  margin-top: 5px;
  font-size: clamp(0.92rem, 1.2vw, 1.1rem);
  font-weight: 600;
  color: var(--subtitle);
  line-height: 1.26;
}
.node-meta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
  padding: 8px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,0.11);
  color: rgba(255,255,255,0.92);
  font-size: 0.92rem;
  letter-spacing: 0.01em;
  font-family: 'SFMono-Regular','Consolas',monospace;
}

/* decision diamond nodes */
.node-decision {
  --title: #f0ecf8;
  --subtitle: #c0b8d8;
  width: 280px;
  border-radius: 12px;
  border-style: dashed;
  background: rgba(40, 35, 60, 0.7);
}

.note-panel {
  position: fixed;
  right: 24px;
  bottom: 24px;
  width: min(380px, calc(100vw - 40px));
  padding: 16px 18px;
  border-radius: 16px;
  border: 1px solid rgba(200,180,255,0.2);
  background: rgba(20,18,30,0.95);
  color: rgba(240,235,255,0.96);
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  backdrop-filter: blur(14px);
  z-index: 2500;
}
.note-panel.is-hidden { display: none; }
.note-panel-title {
  display: block;
  margin-bottom: 8px;
  font-size: 0.82rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #c9b8ff;
}
.note-panel-heading {
  display: block;
  margin-bottom: 8px;
  font-family: "Shantell Sans", cursive;
  font-size: 1.26rem;
  line-height: 1.08;
  color: #e0d4ff;
}
.note-panel p { margin: 0; font-size: 0.96rem; line-height: 1.55; color: rgba(220,210,240,0.92); }
.note-panel code { font-family: 'SFMono-Regular','Consolas',monospace; font-size: 0.88rem; color: #c9b8ff; background: rgba(180,160,255,0.12); padding: 1px 5px; border-radius: 4px; }

.fs-toggle {
  position: fixed;
  top: 24px;
  left: 24px;
  width: 52px;
  height: 52px;
  background: rgba(40,36,60,0.88);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(200,180,255,0.2);
  border-radius: 14px;
  color: #c0b4e8;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
  z-index: 3000;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}
.fs-toggle:hover { background: rgba(60,50,90,0.95); transform: translateY(-3px); border-color: #c9b8ff; color: #c9b8ff; }
.fs-toggle:active { transform: translateY(0) scale(0.92); }

@media (max-width: 740px) {
  .fs-toggle { top: 16px; left: 16px; width: 44px; height: 44px; border-radius: 12px; }
  .note-panel { right: 12px; left: 12px; bottom: 12px; width: auto; padding: 14px; }
}
</style>
</head>
<body>
<main class="page">
<section class="chart-shell">
<div class="chart-grid">

  <button class="fs-toggle" id="fsToggle" title="Toggle Fullscreen">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

      <!-- Root → Q1 (what are you trying to do?) -->

    <div class="node-layer">

      <!-- Q1 DECISION -->
      <!-- Q1 DECISION (Now ROOT) -->
      <article class="node node-root active" data-node="q1" style="--accent:#5e4a9a; top:40px; left:830px; width:340px;">
        <button type="button" aria-pressed="true">
          <span class="node-title">What are you trying to do?</span>

      <!-- BRANCH HEADERS: row 3 -->
      <!-- Instructions -->
      <article class="node" data-node="instructions" style="--accent:#0b6e6e; --title:#a0f0e8; --subtitle:#5acfc4; top:200px; left:80px; width:340px;">
        <button type="button" aria-pressed="false">
          <span class="node-title">Give Claude instructions</span>

        </button>
      </article>

      <!-- Permissions -->
      <article class="node" data-node="permissions" style="--accent:#6e3a0b; --title:#ffd0a0; --subtitle:#ffaa55; top:200px; left:660px; width:340px;">

      <!-- Shortcuts -->
      <article class="node" data-node="shortcuts" style="--accent:#1a6e1a; --title:#a8f0a0; --subtitle:#5cd45c; top:200px; left:1140px; width:340px;">

      <article class="node" data-node="organise" style="--accent:#4a1a8a; --title:#d0b0ff; --subtitle:#a875f5; top:200px; left:1560px; width:340px;">

      <article class="node has-note" data-node="global-claudemd" style="--accent:#0a5a5a; --title:#9ee8e0; --subtitle:#4bbdb5; top:640px; left:40px; width:300px;">
        <button type="button" aria-pressed="false">
          <span class="node-title">~/.claude/CLAUDE.md</span>

      <!-- Q3: private? -->
      <article class="node node-decision" data-node="q3-private" style="--accent:#0a5a5a; top:640px; left:380px; width:280px;">

      <!-- CLAUDE.local.md -->
      <article class="node has-note" data-node="local-claudemd" style="--accent:#7a5500; --title:#ffe0a0; --subtitle:#ffb840; top:860px; left:210px; width:290px;">

      <!-- CLAUDE.md project -->
      <article class="node has-note" data-node="project-claudemd" style="--accent:#0a5a5a; --title:#9ee8e0; --subtitle:#4bbdb5; top:860px; left:540px; width:290px;">
        <button type="button" aria-pressed="false">
          <span class="node-title">CLAUDE.md</span>
          <span class="node-subtitle">Shared project instructions</span>
          <span class="node-meta">project root</span>
        </button>
      </article>

      <!-- ── PERMISSIONS BRANCH ── -->
      <!-- Q4: scope -->
      <article class="node node-decision" data-node="q4-perm" style="--accent:#5a3008; top:420px; left:690px; width:280px;">
        <button type="button" aria-pressed="false">
          <span class="node-title">All projects or just this one?</span>
        </button>
      </article>

      <!-- Global settings -->
      <article class="node has-note" data-node="global-settings" style="--accent:#6e3a0b; --title:#ffd0a0; --subtitle:#ffaa55; top:640px; left:510px; width:300px;">
        <button type="button" aria-pressed="false">
          <span class="node-title">~/.claude/settings.json</span>
          <span class="node-subtitle">Applies to all your projects</span>

        </button>

      <!-- Project settings -->
      <article class="node has-note" data-node="project-settings" style="--accent:#6e3a0b; --title:#ffd0a0; --subtitle:#ffaa55; top:640px; left:850px; width:300px;">

          <span class="node-title">.claude/settings.json</span>
          <span class="node-subtitle">Scoped to this project only</span>

        </button>
      </article>

      <!-- ── SHORTCUTS BRANCH ── -->
      <!-- Commands folder -->
      <article class="node" data-node="commands-folder" style="--accent:#186018; --title:#a8efa0; --subtitle:#5cd45c; top:420px; left:1160px; width:300px;">

      <!-- Q5: arguments? -->
      <article class="node node-decision" data-node="q5-args-q" style="--accent:#145014; top:640px; left:1170px; width:280px;">

        </button>

      <!-- With $ARGUMENTS -->
      <article class="node has-note" data-node="with-args" style="--accent:#186018; --title:#a8efa0; --subtitle:#5cd45c; top:860px; left:1010px; width:290px;">

<script>
const noteContent = {
  "global-claudemd": {
    heading: "~/.claude/CLAUDE.md",
    body: "Lives at <code>/Users/you/.claude/CLAUDE.md</code> on your Mac. Loaded at the start of every Claude Code session across all your projects. Perfect for personal style preferences, favourite shortcuts, and anything you always want Claude to know — regardless of which repo you're in. Run <code>/init</code> to auto-generate a starter file."
  },
  "local-claudemd": {
    heading: "CLAUDE.local.md",
    body: "Lives in your project root. Loaded just like CLAUDE.md but never committed to git — add it to <code>.gitignore</code>. Ideal for personal dev setup notes: your local URLs (<code>localhost:8000</code>), virtualenv paths (<code>~/venvs/myproject/</code>), test credentials, and Mac-specific commands like using <code>open</code> instead of <code>xdg-open</code>."
  },
  "project-claudemd": {
    heading: "CLAUDE.md",
    body: "Lives in your project root (or <code>.claude/CLAUDE.md</code>). This is the main instruction file — it tells Claude about your tech stack, how to run the project, coding standards, and where key files live. Keep it under 200 lines for best results. Generate a starter with <code>/init</code>."
  },
  "global-settings": {
    heading: "~/.claude/settings.json",
    body: "Lives at <code>/Users/you/.claude/settings.json</code>. Sets your personal permission defaults across all projects — for example, always allow <code>git status</code> and always deny reading <code>.env</code> files. These are your lowest-priority defaults; project settings can override them."
  },
  "project-settings": {
    heading: ".claude/settings.json",
    body: "Lives at <code>.claude/settings.json</code> inside your project. Controls what Claude can run in this project: <code>allow</code> safe commands like <code>pytest *</code> so Claude never has to ask, and <code>deny</code> risky ones like <code>rm -rf *</code>. Also the place for hooks — run <code>black</code> automatically after every file edit. Use <code>/config</code> or edit the JSON directly."
  },
  "with-args": {
    heading: "Commands with $ARGUMENTS",
    body: "Put <code>$ARGUMENTS</code> anywhere in your <code>.md</code> file and whatever you type after the slash command gets inserted there. Example: <code>/project:fix-issue 42</code> replaces <code>$ARGUMENTS</code> with <code>42</code>, so Claude fixes GitHub issue #42. Great for parameterised workflows like fixing issues, generating docs for a specific module, or running a named test."
  },
  "plain-command": {
    heading: "Plain slash commands",
    body: "A simple <code>.md</code> file with instructions and no variables. Create <code>.claude/commands/review.md</code> and type <code>/project:review</code> to instantly run your code review prompt. No arguments needed — Claude just runs the instructions exactly as written. You can also add YAML frontmatter like <code>allowed-tools: Bash(git *)</code> to restrict which tools the command can use."
  },
  "scoped-rules": {
    heading: "Path-scoped rules",
    body: "Add YAML frontmatter at the top of your rules file:<br><br><code>---<br>paths:<br>&nbsp;&nbsp;- \"src/api/**/*.py\"<br>---</code><br><br>The rule file only loads when Claude is working with files matching that pattern. Useful for keeping API-specific rules out of your context when you're working on frontend code."
  },
  "always-rules": {
    heading: "Always-loaded rules",
    body: "Rules files with no <code>paths:</code> frontmatter are loaded at the start of every session, just like CLAUDE.md. Great for universal standards: code style, testing conventions, security guidelines. Split these out of CLAUDE.md when the file grows beyond ~200 lines or when different topics are maintained by different workflows."
  }
};

const edgesByNode = {
  q1:               ["q1-instructions","q1-permissions","q1-shortcuts","q1-organise"],
  instructions:     ["q1-instructions","inst-q2"],
  permissions:      ["q1-permissions","perm-q4"],
  shortcuts:        ["q1-shortcuts","shortcuts-commands"],
  organise:         ["q1-organise","organise-rules"],
  "q2-inst":        ["inst-q2","q2-global-inst","q2-q3"],
  "global-claudemd":["q1-instructions","inst-q2","q2-global-inst"],
  "q3-private":     ["q2-q3","q3-local","q3-project-claudemd"],
  "local-claudemd": ["q1-instructions","inst-q2","q2-q3","q3-local"],
  "project-claudemd":["q1-instructions","inst-q2","q2-q3","q3-project-claudemd"],
  "q4-perm":        ["perm-q4","q4-global-settings","q4-project-settings"],
  "global-settings":["q1-permissions","perm-q4","q4-global-settings"],
  "project-settings":["q1-permissions","perm-q4","q4-project-settings"],
  "commands-folder":["q1-shortcuts","shortcuts-commands","commands-q5"],
  "q5-args-q":      ["shortcuts-commands","commands-q5","q5-args","q5-plain"],
  "with-args":      ["q1-shortcuts","shortcuts-commands","commands-q5","q5-args"],
  "plain-command":  ["q1-shortcuts","shortcuts-commands","commands-q5","q5-plain"],
  "rules-folder":   ["q1-organise","organise-rules","rules-q6"],
  "q6-scope":       ["organise-rules","rules-q6","q6-scoped","q6-always"],
  "scoped-rules":   ["q1-organise","organise-rules","rules-q6","q6-scoped"],
  "always-rules":   ["q1-organise","organise-rules","rules-q6","q6-always"],
};

const nodes  = Array.from(document.querySelectorAll(".node"));
const lines  = Array.from(document.querySelectorAll(".line"));
const notePanel        = document.getElementById("notePanel");
const notePanelHeading = document.getElementById("notePanelHeading");
const notePanelBody    = document.getElementById("notePanelBody");

const CHART_WIDTH  = 1480;
const CHART_HEIGHT = 1134;

function renderNote(key) {
  const note = noteContent[key];
  if (!note) { notePanel.classList.add("is-hidden"); return; }
  notePanelHeading.textContent = note.heading;
  notePanelBody.innerHTML      = note.body;
  notePanel.classList.remove("is-hidden");
}

function renderDetails(key) {
  const activeEdges = new Set(edgesByNode[key] || []);
  nodes.forEach(node => {
    const isActive = node.dataset.node === key;
    node.classList.toggle("active", isActive);
    const btn = node.querySelector("button");
    if (btn) btn.setAttribute("aria-pressed", String(isActive));
  });
  lines.forEach(line => line.classList.toggle("active", activeEdges.has(line.dataset.edge)));
  renderNote(key);
}

nodes.forEach(node => {
  const key = node.dataset.node;
  const btn = node.querySelector("button");
  const activate = () => renderDetails(key);
  node.addEventListener("mouseenter", activate);
  btn.addEventListener("focus", activate);
  btn.addEventListener("click", activate);
});

function handleResize() {
  const stage       = document.querySelector(".chart-stage");
  const grid        = document.querySelector(".chart-grid");
  const connections = document.querySelector(".connections");
  if (!stage || !grid) return;

  const vw = window.visualViewport?.width  || window.innerWidth  || document.documentElement.clientWidth;
  const vh = window.visualViewport?.height || window.innerHeight || document.documentElement.clientHeight;

  document.body.style.overflow = "hidden";
  stage.style.position = "absolute";
  stage.style.left     = "50%";
  stage.style.width    = `${CHART_WIDTH}px`;
  stage.style.height   = `${CHART_HEIGHT}px`;
  if (connections) connections.setAttribute("viewBox", `0 0 ${CHART_WIDTH} ${CHART_HEIGHT}`);

  const isMobile = vw <= 740;
  const isTablet = vw > 740 && vw <= 1024;
  const hPad = document.fullscreenElement ? 20 : isMobile ? 12 : isTablet ? 18 : 24;
  const vPad = document.fullscreenElement ? 28 : isMobile ? 18 : isTablet ? 30 : 44;

  const avW = Math.max(320, vw - hPad);
  const avH = Math.max(320, vh - vPad);
  const scaleW = avW / CHART_WIDTH;
  const scaleH = avH / CHART_HEIGHT;
  const maxScale = document.fullscreenElement ? 1.32 : isMobile ? 0.76 : isTablet ? 0.96 : 1.1;
  const minScale = isMobile ? 0.28 : 0.36;
  const scale    = Math.max(minScale, Math.min(maxScale, scaleW, scaleH));

  const scaledH   = CHART_HEIGHT * scale;
  const baseY     = document.fullscreenElement ? 40 : isMobile ? 22 : 36;
  const nudge     = document.fullscreenElement ? 28 : isMobile ? 10 : 16;
  const yOffset   = Math.max(baseY, (avH - scaledH) / 2 + nudge);

  stage.style.transform = `translateX(-50%) translateY(${yOffset}px) scale(${scale})`;
  grid.style.height    = `${Math.max(vh, scaledH + yOffset * 2)}px`;
  grid.style.minHeight = `${vh}px`;
}

if (window.ResizeObserver) {
  const ro = new ResizeObserver(() => window.requestAnimationFrame(handleResize));
  ro.observe(document.documentElement);
  ro.observe(document.body);
} else {
  window.addEventListener("resize", handleResize);
}
window.visualViewport?.addEventListener("resize", handleResize);
window.addEventListener("resize", handleResize);
handleResize();

function setFsState(isFs) {
  const btn = document.getElementById("fsToggle");
  btn.title = isFs ? "Exit Fullscreen" : "Toggle Fullscreen";
  btn.innerHTML = isFs
    ? '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M10 14l-7 7"/></svg>'
    : '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>';
}

document.getElementById("fsToggle").addEventListener("click", () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => console.error(err));
  } else {
    document.exitFullscreen();
  }
});
document.addEventListener("fullscreenchange", () => {
  setFsState(Boolean(document.fullscreenElement));
  setTimeout(handleResize, 100);
});

renderDetails("q1");
setFsState(false);
</script>
</body>
