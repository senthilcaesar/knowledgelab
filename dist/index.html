<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/knowledgelab/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowledge Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/knowledgelab/assets/index-CaTK3O7A.js"></script>
    <link rel="stylesheet" crossorigin href="/knowledgelab/assets/index-DmJAnOrA.css">
  </head>
  <body>
    <canvas id="constellation-bg"></canvas>
    <div id="zen-flow-bg" class="zen-flow-bg"></div>
    <div id="app">
      <aside class="sidebar">
        <header class="sidebar-header">
          <h1 id="home-link">Knowledge<span>Lab</span></h1>
        </header>
        <nav class="nav-menu">
          <ul id="concept-list">
            <!-- Concepts will be injected here -->
          </ul>
        </nav>
      </aside>
      <main class="main-content">
        <header class="top-bar">
          <button id="sidebar-toggle" class="sidebar-toggle-btn" title="Toggle Sidebar">
            <span class="toggle-icon">‹</span>
          </button>
          <div class="search-container">
            <input type="text" id="concept-search" placeholder="Search concepts...">
          </div>
          <div class="header-actions">
            <button id="tech-stack-btn" class="tech-stack-btn" title="Project Tech Stack">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
              <span>Tech Stack</span>
            </button>
            <button id="study-mode-btn" class="study-mode-btn" title="Study Mode">
              <span class="icon">⏱️</span>
            </button>
            <button id="theme-toggle" class="theme-btn" title="Toggle Light/Dark Mode">
              <span class="icon">🌙</span>
            </button>
          </div>
        </header>
        <section id="content-area" class="content-area">
          <div class="welcome-card">
            <h2>Welcome to My Knowledge Lab</h2>
            <p>Select a tutorial from the sidebar to begin your interactive learning journey.</p>
          </div>
        </section>
      </main>

    </div>

    <!-- Tech Stack Modal Overlay -->
    <div id="tech-stack-overlay" class="tech-stack-overlay hidden">
      <div class="tech-stack-modal">
        <header class="tech-stack-header">
          <h2>Project Tech Stack</h2>
          <button id="close-tech-stack" class="close-btn" title="Close Modal">✕</button>
        </header>
        <div class="tech-stack-content">
          <p class="tech-stack-intro">This app is built using the following technologies:</p>
          <ul id="tech-stack-list" class="tech-stack-list">
            <!-- Technologies will be injected here -->
          </ul>
        </div>
      </div>
    </div>

    <!-- Study Mode Overlay -->
    <div id="study-mode-overlay" class="study-mode-overlay hidden">
      <canvas id="zen-flow-canvas" class="zen-flow-canvas"></canvas>
      <div class="study-container">
        <header class="study-header">
          <div class="study-logo">✦ FOCUS</div>
          <div class="study-header-actions">
            <button id="minimize-study" class="minimize-btn" title="Minimize — keep timer running">
              <span>⌃</span>
            </button>
            <button id="exit-study" class="exit-btn" title="Exit Study Mode">
              <span>✕</span>
            </button>
          </div>
        </header>

        <div class="study-content">
          <!-- Timer View -->
          <div id="timer-view" class="study-view active">
            <div class="timer-wrapper">
              <div class="breathing-ring"></div>
              <div class="timer-ring">
                <svg viewBox="0 0 280 280">
                  <circle class="timer-track" cx="140" cy="140" r="130"/>
                  <circle id="timer-progress" class="timer-progress" cx="140" cy="140" r="130"/>
                </svg>
                <div class="timer-display">
                  <span id="timer-minutes" class="timer-digits">25</span>
                  <span class="timer-sep">:</span>
                  <span id="timer-seconds" class="timer-digits">00</span>
                </div>
              </div>
              <div class="timer-status" id="timer-status">Ready to focus</div>
            </div>

            <div class="timer-actions">
              <button id="timer-toggle" class="primary-btn">Start Focus</button>
              <button id="timer-reset" class="secondary-btn">Reset</button>
              <button id="lock-screen-btn" class="lock-btn hidden" title="Lock Screen">
                <span>🔒</span>
              </button>
            </div>

            <div class="timer-presets">
              <button class="preset-btn" data-time="15">15m</button>
              <button class="preset-btn active" data-time="25">25m</button>
              <button class="preset-btn" data-time="45">45m</button>
              <button class="preset-btn" data-time="60">60m</button>
            </div>
          </div>
        </div>
      </div>
      <!-- Lock screen unlock overlay -->
      <div id="unlock-screen-overlay" class="unlock-screen-overlay hidden">
        <button id="unlock-screen-btn" class="unlock-btn" title="Unlock Screen">
          <span class="unlock-icon">🔓</span>
          <span>Unlock</span>
        </button>
      </div>
    </div>

    <!-- Floating mini-timer widget (shown when study mode is minimized) -->
    <div id="mini-timer" class="mini-timer hidden">
      <div class="mini-timer-inner" id="expand-study" title="Click to expand Study Mode">
        <span class="mini-timer-icon">⏱️</span>
        <span id="mini-timer-display" class="mini-timer-display">25:00</span>
        <div class="mini-timer-bar">
          <div id="mini-timer-progress" class="mini-timer-progress"></div>
        </div>
      </div>
      <button id="mini-stop-btn" class="mini-stop-btn" title="Stop timer & exit Study Mode">✕</button>
    </div>

  </body>
</html>
