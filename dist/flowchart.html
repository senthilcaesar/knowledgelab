<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Shantell+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #232220;
        --panel: rgba(57, 55, 50, 0.84);
        --panel-border: rgba(255, 255, 255, 0.12);
        --text: #f3eee5;
        --muted: #c7c0b4;
        --line: rgba(255, 255, 255, 0.5);
        --line-active: #f6e4b7;
        --shadow: 0 22px 48px rgba(0, 0, 0, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      html {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        font-family: "Manrope", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 28%),
          linear-gradient(180deg, #2a2926 0%, #232220 100%);
        overflow: hidden;
      }

      /* Themed scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.1);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .page {
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      .header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        margin-bottom: 18px;
      }

      .header h1 {
        margin: 0;
        font-size: clamp(1.8rem, 2.8vw, 2.8rem);
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .header p {
        margin: 8px 0 0;
        max-width: 720px;
        color: var(--muted);
        line-height: 1.5;
      }

      .chart-shell {
        position: relative;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: visible;
      }

      .chart-grid {
        position: relative;
        padding: 0;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: visible;
      }

      .chart-stage {
        position: absolute;
        top: 0;
        left: 50%;
        width: 1480px;
        height: 1120px;
        transform-origin: top center;
        /* Initial transform will be set by JS */
      }

      .connections {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
      }

      .line {
        fill: none;
        stroke: var(--line);
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: stroke 180ms ease, stroke-width 180ms ease, opacity 180ms ease;
        opacity: 0.9;
        marker-end: url(#arrowhead);
      }

      .line.active {
        stroke: var(--line-active);
        stroke-width: 4.5;
        opacity: 1;
        filter: drop-shadow(0 0 14px rgba(246, 228, 183, 0.3));
        marker-end: url(#arrowhead-active);
      }

      .node-layer {
        position: relative;
        min-height: 1070px;
        z-index: 2;
      }

      .node {
        position: absolute;
        width: 400px;
        padding: 18px 24px 20px;
        border-radius: 20px;
        border: 1.5px solid color-mix(in srgb, var(--accent) 82%, white 18%);
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--accent) 50%, #0d0c0b 50%) 0%,
          color-mix(in srgb, var(--accent) 68%, #0d0c0b 32%) 100%
        );
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 18px 28px rgba(0, 0, 0, 0.16);
        color: var(--title);
        transition:
          transform 180ms ease,
          box-shadow 180ms ease,
          border-color 180ms ease,
          filter 180ms ease;
      }

      .node button {
        all: unset;
        display: block;
        cursor: pointer;
        width: 100%;
      }

      .node:hover,
      .node:focus-within,
      .node.active {
        transform: translateY(-3px) scale(1.01);
        border-color: color-mix(in srgb, var(--accent) 70%, white 30%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.12),
          0 24px 34px rgba(0, 0, 0, 0.24);
        filter: saturate(1.08);
      }

      .node-title {
        display: block;
        font-family: 'Shantell Sans', cursive;
        font-size: clamp(1.55rem, 2.15vw, 2.35rem);
        line-height: 1.05;
        font-weight: 550;
        letter-spacing: -0.01em;
      }

      .node-subtitle {
        display: block;
        margin-top: 6px;
        font-size: clamp(1.05rem, 1.4vw, 1.28rem);
        font-weight: 600;
        color: var(--subtitle);
        line-height: 1.22;
      }

      .node-meta {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin-top: 14px;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.95);
        font-size: 1.02rem;
        letter-spacing: 0.01em;
      }

      @media (max-width: 1024px) {
        .chart-shell,
        .chart-grid {
          min-height: 100vh;
          min-height: 100dvh;
        }
      }

      @media (max-width: 740px) {
        .fs-toggle {
          top: 16px;
          left: 16px;
          width: 44px;
          height: 44px;
          border-radius: 12px;
        }
      }

      .fs-toggle {
        position: fixed;
        top: 24px;
        left: 24px;
        width: 52px;
        height: 52px;
        background: rgba(45, 45, 45, 0.85);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 14px;
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 3000;
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      }

      .fs-toggle:hover {
        background: rgba(60, 60, 60, 0.95);
        transform: translateY(-3px);
        border-color: #f6e4b7;
        color: #f6e4b7;
      }

      .fs-toggle:active {
        transform: translateY(0) scale(0.92);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="chart-shell">
        <div class="chart-grid">
          <button class="fs-toggle" id="fsToggle" title="Toggle Fullscreen">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" />
            </svg>
          </button>
          <div class="chart-stage">
          <svg class="connections" viewBox="0 0 1480 1120" preserveAspectRatio="none" aria-hidden="true">
            <defs>
              <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="8.5" refY="3.5" orient="auto" markerUnits="strokeWidth">
                <path d="M 0 0 L 7 3.5 L 0 7 z" fill="rgba(255, 255, 255, 0.6)"></path>
              </marker>
              <marker id="arrowhead-active" markerWidth="12" markerHeight="12" refX="8.5" refY="3.5" orient="auto" markerUnits="strokeWidth">
                <path d="M 0 0 L 7 3.5 L 0 7 z" fill="#f6e4b7"></path>
              </marker>
            </defs>
            <path class="line" data-edge="root-access" d="M 620 120 C 520 158, 380 212, 220 280" />
            <path class="line" data-edge="root-repeat-mid" d="M 740 158 L 740 280" />
            <path class="line" data-edge="root-rules" d="M 900 120 C 1015 158, 1175 212, 1300 280" />
            <path class="line" data-edge="root-subtask" d="M 690 136 L 480 240 L 480 856" />
            <path class="line" data-edge="root-parallel" d="M 890 136 L 1040 240 L 1040 856" />
            <path class="line" data-edge="access-mcp" d="M 220 400 L 220 580" />
            <path class="line" data-edge="repeat-skills" d="M 740 400 L 740 580" />
            <path class="line" data-edge="rules-hooks" d="M 1300 400 L 1300 580" />
            <path class="line" data-edge="subtask-subagents" d="M 480 902 L 480 1170" />
            <path class="line" data-edge="parallel-agent-teams" d="M 1040 902 L 1040 1170" />
          </svg>

          <div class="node-layer">
            <article class="node active" data-node="root" style="--accent:#5f5d57; --title:#f1ede6; --subtitle:#d2cbc0; top: 24px; left: 540px;">
              <button type="button" aria-pressed="true">
                <span class="node-title">What do you need?</span>
                <span class="node-subtitle">Start here and choose the best path</span>
                <span class="node-meta">Primary decision</span>
              </button>
            </article>

            <article class="node" data-node="access" style="--accent:#16528f; --title:#b9d8ff; --subtitle:#87b5ef; top: 280px; left: 20px;">
              <button type="button" aria-pressed="false">
                <span class="node-title">Connect to external tools and data sources</span>
                <span class="node-subtitle">DB, API, GitHub, Slack</span>
                <span class="node-meta">Integration route</span>
              </button>
            </article>

            <article class="node" data-node="repeat" style="--accent:#0b745f; --title:#a6e5d2; --subtitle:#62cea8; top: 280px; left: 540px;">
              <button type="button" aria-pressed="false">
                <span class="node-title">Repeatable Workflows</span>
                <span class="node-subtitle">same steps, every time</span>
                <span class="node-meta">Process route</span>
              </button>
            </article>

            <article class="node" data-node="rules" style="--accent:#8a5204; --title:#ffd089; --subtitle:#ffab21; top: 280px; left: 1100px;">
              <button type="button" aria-pressed="false">
                <span class="node-title">Enforce rules</span>
                <span class="node-subtitle">lint, block, notify</span>
                <span class="node-meta">Guardrail route</span>
              </button>
            </article>

            <article class="node" data-node="mcp" style="--accent:#18518b; --title:#b7d6ff; --subtitle:#8cb7ef; top: 580px; left: 20px;">
              <button type="button" aria-pressed="false">
                <span class="node-title">Use MCP</span>
                <span class="node-subtitle">claude mcp add ...</span>
                <span class="node-meta">Tooling choice</span>
              </button>
            </article>

            <article class="node" data-node="skills" style="--accent:#0b6d5c; --title:#a5e3d2; --subtitle:#65cfab; top: 580px; left: 540px;">
              <button type="button" aria-pressed="false">
                <span class="node-title">Use Skills</span>
                <span class="node-subtitle">SKILL.md + /command</span>
                <span class="node-meta">Reusable guidance</span>
              </button>
            </article>

            <article class="node" data-node="hooks" style="--accent:#8a5304; --title:#ffd191; --subtitle:#ffaf27; top: 580px; left: 1100px;">
              <button type="button" aria-pressed="false">
                <span class="node-title">Use Hooks</span>
                <span class="node-subtitle">settings.json events</span>
                <span class="node-meta">Automation events</span>
              </button>
            </article>

            <article class="node" data-node="subtask" style="--accent:#973b16; --title:#ffc7ad; --subtitle:#eea17f; top: 820px; left: 280px;">
              <button type="button" aria-pressed="false">
                <span class="node-title">Delegate a subtask</span>
                <span class="node-subtitle">heavy/isolated work</span>
                <span class="node-meta">Focused delegation</span>
              </button>
            </article>

            <article class="node" data-node="parallel" style="--accent:#8d2856; --title:#f7b5d1; --subtitle:#ef90ba; top: 820px; left: 840px;">
              <button type="button" aria-pressed="false">
                <span class="node-title">Parallel teamwork</span>
                <span class="node-subtitle">agents cross-checking</span>
                <span class="node-meta">Multi-agent path</span>
              </button>
            </article>

            <article class="node" data-node="subagents" style="--accent:#963b16; --title:#ffc7ad; --subtitle:#eea17f; top: 1170px; left: 280px;">
              <button type="button" aria-pressed="false">
                <span class="node-title">Use Subagents</span>
                <span class="node-subtitle">~/.claude/agents/</span>
                <span class="node-meta">Delegation output</span>
              </button>
            </article>

            <article class="node" data-node="agentTeams" style="--accent:#8a2b56; --title:#f8b8d3; --subtitle:#ef96bf; top: 1170px; left: 840px;">
              <button type="button" aria-pressed="false">
                <span class="node-title">Use Agent teams</span>
                <span class="node-subtitle">Experimental flag</span>
                <span class="node-meta">Team orchestration</span>
              </button>
            </article>

          </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const edgesByNode = {
        root: ["root-access", "root-repeat-mid", "root-rules", "root-subtask", "root-parallel"],
        access: ["root-access", "access-mcp"],
        repeat: ["root-repeat-mid", "repeat-skills"],
        rules: ["root-rules", "rules-hooks"],
        mcp: ["root-access", "access-mcp"],
        skills: ["root-repeat-mid", "repeat-skills"],
        hooks: ["root-rules", "rules-hooks"],
        subtask: ["root-subtask", "subtask-subagents"],
        parallel: ["root-parallel", "parallel-agent-teams"],
        subagents: ["root-subtask", "subtask-subagents"],
        agentTeams: ["root-parallel", "parallel-agent-teams"]
      };

      const nodes = Array.from(document.querySelectorAll(".node"));
      const lines = Array.from(document.querySelectorAll(".line"));
      const CHART_WIDTH = 1480;
      const CHART_HEIGHT = 1460;

      function renderDetails(key) {
        const activeEdges = new Set(edgesByNode[key] || []);
        nodes.forEach((node) => {
          const isActive = node.dataset.node === key;
          node.classList.toggle("active", isActive);
          const button = node.querySelector("button");
          if (button) button.setAttribute("aria-pressed", String(isActive));
        });

        lines.forEach((line) => {
          line.classList.toggle("active", activeEdges.has(line.dataset.edge));
        });
      }

      nodes.forEach((node) => {
        const key = node.dataset.node;
        const button = node.querySelector("button");
        const activate = () => renderDetails(key);
        node.addEventListener("mouseenter", activate);
        button.addEventListener("focus", activate);
        button.addEventListener("click", activate);
      });

      function handleResize() {
        const stage = document.querySelector('.chart-stage');
        const grid = document.querySelector('.chart-grid');
        const connections = document.querySelector('.connections');
        if (!stage || !grid) return;

        const viewportWidth = window.visualViewport?.width || window.innerWidth || document.documentElement.clientWidth;
        const viewportHeight = window.visualViewport?.height || window.innerHeight || document.documentElement.clientHeight;
        
        document.body.style.overflow = 'hidden';
        stage.style.position = 'absolute';
        stage.style.left = '50%';
        stage.style.width = `${CHART_WIDTH}px`;
        stage.style.height = `${CHART_HEIGHT}px`;
        if (connections) {
          connections.setAttribute('viewBox', `0 0 ${CHART_WIDTH} ${CHART_HEIGHT}`);
        }
        
        const isMobile = viewportWidth <= 740;
        const isTablet = viewportWidth > 740 && viewportWidth <= 1024;
        const horizontalPadding = document.fullscreenElement ? 20 : isMobile ? 12 : isTablet ? 18 : 24;
        const verticalPadding = document.fullscreenElement ? 28 : isMobile ? 18 : isTablet ? 30 : 44;
        const availableWidth = Math.max(320, viewportWidth - horizontalPadding);
        const availableHeight = Math.max(320, viewportHeight - verticalPadding);
        
        const scaleW = availableWidth / CHART_WIDTH;
        const scaleH = availableHeight / CHART_HEIGHT;
        
        const maxScale = document.fullscreenElement ? 1.32 : isMobile ? 0.76 : isTablet ? 0.96 : 1.12;
        const minScale = isMobile ? 0.34 : 0.42;
        const scale = Math.max(minScale, Math.min(maxScale, scaleW, scaleH));
        const scaledHeight = CHART_HEIGHT * scale;
        const baseYOffset = document.fullscreenElement ? 40 : isMobile ? 22 : 36;
        const centeringNudge = document.fullscreenElement ? 28 : isMobile ? 10 : 16;
        const yOffset = Math.max(baseYOffset, (availableHeight - scaledHeight) / 2 + centeringNudge);
        
        stage.style.transform = `translateX(-50%) translateY(${yOffset}px) scale(${scale})`;
        grid.style.height = `${Math.max(viewportHeight, scaledHeight + yOffset * 2)}px`;
        grid.style.minHeight = `${viewportHeight}px`;
      }

      if (window.ResizeObserver) {
        const observer = new ResizeObserver(() => {
          window.requestAnimationFrame(handleResize);
        });
        observer.observe(document.documentElement);
        observer.observe(document.body);
      } else {
        window.addEventListener('resize', handleResize);
      }

      window.visualViewport?.addEventListener('resize', handleResize);
      window.addEventListener('resize', handleResize);
      handleResize();

      // Fullscreen Logic
      const fsToggle = document.getElementById('fsToggle');
      fsToggle.addEventListener('click', () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(err => {
            console.error(`Error attempting to enable fullscreen: ${err.message}`);
          });
        } else {
          document.exitFullscreen();
        }
      });

      document.addEventListener('fullscreenchange', () => {
        if (document.fullscreenElement) {
          fsToggle.innerHTML = '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M10 14l-7 7" /></svg>';
          fsToggle.title = "Exit Fullscreen";
        } else {
          fsToggle.innerHTML = '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" /></svg>';
          fsToggle.title = "Toggle Fullscreen";
        }
        // Force a scale update after the browser finishes resizing the element
        setTimeout(handleResize, 100);
      });

      renderDetails("root");
    </script>
  </body>
</html>
